services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app:ro
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./expense-tracker
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://backend:3001
