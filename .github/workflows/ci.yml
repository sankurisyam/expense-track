name: Expense Tracker CI

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            expense-tracker/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Install frontend dependencies
        working-directory: expense-tracker
        run: npm ci --no-audit --no-fund

      - name: Lint frontend
        working-directory: expense-tracker
        run: npm run lint

      - name: Run frontend tests
        working-directory: expense-tracker
        run: npm test -- --run

      - name: Build frontend
        working-directory: expense-tracker
        run: npm run build

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Workflow failed on commit ${sha.slice(0, 7)}`;
            const body = [
              `The CI workflow failed on commit \`${sha}\`.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Please inspect the failing job logs and fix the issue on the dev branch.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
